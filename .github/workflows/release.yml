name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version to release (semver)"
        required: true
      visibility:
        description: "Release visibility"
        required: true
        type: choice
        default: "public"
        options:
          - public
          - restricted

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# Grant write permissions to the repository contents so we can push version updates
permissions:
  contents: write
  id-token: write

env:
  TAG: ${{ github.event.inputs.version }}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format
        run: npm run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test

  publish:
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Update package.json with release tag, commit and push version update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          npm version "${{ env.TAG }}" --message "chore: bump version to %s"
          git push origin ${{ github.event.repository.default_branch }}
      - name: Publish to npm
        run: npm publish --access ${{ github.event.inputs.visibility }}
      - name: Create Github Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          name: "pdf-highlighter-kit ${{ env.TAG }}"
          allowUpdates: true
          generateReleaseNotes: true
          tag: ${{ env.TAG }}
          draft: ${{ github.event.inputs.visibility == 'restricted' }}
